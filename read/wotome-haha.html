    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Css Styles -->
    <link rel="stylesheet" href="../css/bootstrap.min.css" type="text/css">
    <link rel="stylesheet" href="../css/font-awesome.min.css" type="text/css">
    <link rel="stylesheet" href="../css/elegant-icons.css" type="text/css">
    <link rel="stylesheet" href="../css/plyr.css" type="text/css">

    <link rel="stylesheet" href="../css/slicknav.min.css" type="text/css">
    <link rel="stylesheet" href="../css/style.css" type="text/css">
    <style>
        .mobile-progress-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: rgba(0, 0, 0, 0.1);
            z-index: 1000;
            display: none;
        }

        .mobile-progress-menu.active {
            display: block;
        }

        .mobile-progress-menu .progress-container {
            width: 100%;
            height: 100%;
        }

        #scroll-progress-bar {
            height: 100%;
            width: 0;
            background: #e53637;
        }

        .page-jump-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            display: none;
            text-align: center;
        }

        .page-jump-menu.active {
            display: block;
        }

        .page-jump-menu select {
            width: 90%;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        @media only screen and (min-width: 768px) {

            /* Sembunyikan menu mobile pada layar >768px */
            .mobile-progress-menu,
            .page-jump-menu {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <!-- Mobile Progress Bar Menu -->
    <div class="mobile-progress-menu">
        <div class="progress-container">
            <div id="scroll-progress-bar"></div>
        </div>
    </div>


    <!-- Header Section Begin -->

                        <a href="../index.html">

                </div>
                <div class="col-lg-8">
                    <div class="header__nav">
                        <nav class="header__menu mobile-menu">

                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
            <div id="mobile-menu-wrap"></div>
        </div>
    </header>
    <!-- Header End -->

    <!-- Blog Details Section Begin -->
    <section class="blog-details spad">
        <div class="container">
            <div class="row d-flex justify-content-center">
                <div class="col-lg-8">
                    <div class="blog__details__title">
                        <h6>Action, Magic <span>- March 08, 2020</span></h6>
                        <h2>Wotome Haha Maiden Mother</h2>
                    </div>
                </div>
                <div class="col-lg-12">
                    <div class="blog__details__pic" id="gambar-container"></div>
                </div>

                <script>
                    const container = document.getElementById("gambar-container");

                    for (let i = 1; i <= 216; i++) {
                        // Format angka jadi tiga digit (001, 002, ..., 175)
                        const num = String(i).padStart(3, '0');

                        const img = document.createElement("img");

                        if (i == 1 || i == 2 || i == 3) {
                            if (i == 2) {
                                continue;
                            }
                            img.src = `../img/manga/Wotome Haha Maiden Mother/${num}.jpg`;
                        } else {
                            img.src = `../img/manga/Wotome Haha Maiden Mother/${num}.png`;
                        }

                        img.alt = `Gambar ${num}`;
                        container.appendChild(img);
                    }
                </script>

            </div>
        </div>
    </section>
    <!-- Blog Details Section End -->

    <!-- Footer Section Begin -->
    <footer class="footer">
        <div class="page-up">
            <a href="#" id="scrollToTopButton"><span class="arrow_carrot-up"></span></a>
        </div>
        <div class="container">
            <div class="row">
                <div class="col-lg-3">
                    <div class="footer__logo">
                        <a href="./index.html"><img src="../img/logo.png" alt=""></a>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="footer__nav">
                        <ul>
                            <li class="active"><a href="./index.html">Homepage</a></li>
                            <li><a href="./categories.html">Categories</a></li>
                            <li><a href="./blog.html">Our Blog</a></li>

                </div>

                        Copyright &copy;

                            target="_blank">Colorlib</a>

    <!-- Search model Begin -->
    <div class="search-model">
        <div class="h-100 d-flex align-items-center justify-content-center">

                <input type="text" id="search-input" placeholder="Search here.....">

        </div>
    </div>
    <!-- Search model end -->

    <!-- Js Plugins -->
    <script src="../js/jquery-3.3.1.min.js"></script>
    <script src="../js/bootstrap.min.js"></script>
    <script src="../js/player.js"></script>
    <script src="../js/jquery.nice-select.min.js"></script>
    <script src="../js/mixitup.min.js"></script>
    <script src="../js/jquery.slicknav.js"></script>
    <script src="../js/owl.carousel.min.js"></script>
    <script src="../js/main.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const pageSelect = document.getElementById('page-select');
            // Populasi dropdown
            for (let i = 1; i <= 50; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = `Page ${String(i).padStart(2, '0')}`;
                pageSelect.appendChild(option);
            }

            // Update progress bar saat scroll
            window.addEventListener('scroll', () => {
                const scrollTop = window.scrollY || document.documentElement.scrollTop;
                const docHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                const scrolled = (scrollTop / docHeight) * 100;
                document.getElementById('scroll-progress-bar').style.width = scrolled + '%';
            });

            // Scroll to gambar saat pilih dropdown
            pageSelect.addEventListener('change', (e) => {
                const pageNum = e.target.value;
                if (!pageNum) return;
                const imgs = document.querySelectorAll('#gambar-container img');
                const target = imgs[pageNum - 1];
                if (target) target.scrollIntoView({ behavior: 'smooth' });
            });

            // Toggle show/hide menu dengan double tap
            let lastTap = 0;
            document.addEventListener('touchstart', (e) => {
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTap;
                if (tapLength < 500 && tapLength > 0) {
                    document.querySelector('.mobile-progress-menu').classList.toggle('active');
                    document.querySelector('.page-jump-menu').classList.toggle('active');
                    e.preventDefault();
                }
                lastTap = currentTime;
            });
        });
    </script>


    <!-- Page Jump Dropdown Menu -->
    <div class="page-jump-menu">
        <select id="page-select" aria-label="Jump to page">
            <option value="">Pilih Halaman</option>
            <!-- Options akan dipopulasi lewat JS -->
        </select>
    </div>

</body>
